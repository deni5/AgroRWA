name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Smart contract tests ──────────────────────────────────────────────────
  anchor-tests:
    name: Anchor Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.30.1
          avm use 0.30.1

      - name: Setup Solana keypair
        run: solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json

      - name: Build programs
        run: anchor build

      - name: Run tests
        run: anchor test --skip-deploy

  # ── Frontend lint + build ─────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_REGISTRY_PROGRAM_ID: AgroReg111111111111111111111111111111111111
          NEXT_PUBLIC_POOL_PROGRAM_ID: AgroPool11111111111111111111111111111111111
          NEXT_PUBLIC_VAULT_PROGRAM_ID: AgroVault1111111111111111111111111111111111
