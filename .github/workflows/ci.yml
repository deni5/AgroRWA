name: CI

on:
  push:
    branches: [main, "AgroRWA v2"] # Додано твою нову гілку
  pull_request:
    branches: [main, "AgroRWA v2"]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_IDENTITY_PROGRAM_ID: AgroID111111111111111111111111111111111111111
          NEXT_PUBLIC_ASSET_REGISTRY_PROGRAM_ID: AgroAsset11111111111111111111111111111111111
          NEXT_PUBLIC_ORACLE_VERIFY_PROGRAM_ID: AgroOracle1111111111111111111111111111111111
          NEXT_PUBLIC_MARKETPLACE_PROGRAM_ID: AgroMkt1111111111111111111111111111111111111
          NEXT_PUBLIC_INSURANCE_PROGRAM_ID: AgroIns1111111111111111111111111111111111111

  anchor:
    name: Anchor Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "/home/runner/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          # Одразу створюємо папку для ключа, щоб не було помилок доступу
          mkdir -p ~/.config/solana

      - name: Install Anchor CLI
        run: |
          # Встановлюємо через avm (Anchor Version Manager) - це в рази швидше
          cargo install --allow-downgrade --no-default-features --force anchor-cli --version 0.30.1

      - name: Setup keypair
        run: |
          # Додаємо повний шлях до бінарника про всяк випадок на цьому кроці
          /home/runner/.local/share/solana/install/active_release/bin/solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Build
        run: anchor build
