name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          NEXT_PUBLIC_IDENTITY_PROGRAM_ID: AgroID111111111111111111111111111111111111111
          NEXT_PUBLIC_ASSET_REGISTRY_PROGRAM_ID: AgroAsset11111111111111111111111111111111111
          NEXT_PUBLIC_ORACLE_VERIFY_PROGRAM_ID: AgroOracle1111111111111111111111111111111111
          NEXT_PUBLIC_MARKETPLACE_PROGRAM_ID: AgroMkt1111111111111111111111111111111111111
          NEXT_PUBLIC_INSURANCE_PROGRAM_ID: AgroIns1111111111111111111111111111111111111

  anchor:
    name: Anchor Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --force
      - name: Setup keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
      - name: Build
        run: anchor build
